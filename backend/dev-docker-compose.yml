services:
  postgres:
    container_name: arbeitly-postgres
    image: postgres:16-alpine
    ports:
      - "5462:5432"
    environment:
      POSTGRES_USER: arbeitly
      POSTGRES_PASSWORD: arbeitly
      POSTGRES_DB: arbeitly
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    container_name: arbeitly-minio
    image: minio/minio
    ports:
      - "9020:9000"
      - "9021:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  valkey:
    container_name: arbeitly-valkey
    image: valkey/valkey
    ports:
      - "6399:6379"
    volumes:
      - valkey_data:/data

volumes:
  postgres_data:
  minio_data:
  valkey_data:
